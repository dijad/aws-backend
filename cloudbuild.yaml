# Cloud Build: build → push Artifact Registry → deploy Cloud Run (API)
# Runs as the Cloud Build service account (not the default Compute SA).

substitutions:
  _REGION: australia-southeast1
  _SERVICE: aws-api
  _AR_REPO: aws
  _IMAGE_NAME: api
  _CLOUD_SQL_CONNECTION: project-e11f6390-f102-4dc8-bc9:australia-southeast1:free-trial-first-project
  _DB_USER: ADMIN
  _DB_NAME: AWS
  _CORS_ORIGIN: https://aws-frontend-281263231105.australia-southeast1.run.app
  _FRONTEND_URL: https://aws-frontend-281263231105.australia-southeast1.run.app

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}
    waitFor: ['build']

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud run deploy "${_SERVICE}" \
          --project="${PROJECT_ID}" \
          --image="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest" \
          --region="${_REGION}" \
          --platform=managed \
          --port=8080 \
          --allow-unauthenticated \
          --min-instances=0 \
          --max-instances=10 \
          --timeout=300 \
          --session-affinity \
          --quiet \
          --set-env-vars="DB_TARGET=cloud-sql,CLOUD_SQL_CONNECTION_NAME=${_CLOUD_SQL_CONNECTION},DB_USER=${_DB_USER},DB_NAME=${_DB_NAME},NODE_ENV=production,CORS_ORIGIN=${_CORS_ORIGIN},FRONTEND_URL=${_FRONTEND_URL},EMAIL_ENABLED=true" \
          --set-secrets="DB_PASSWORD=aws-db-password:latest,JWT_ACCESS_SECRET=aws-jwt-access:latest,JWT_REFRESH_SECRET=aws-jwt-refresh:latest,RESEND_API_KEY=aws-resend-api-key:latest" \
          --add-cloudsql-instances="${_CLOUD_SQL_CONNECTION}"
    waitFor: ['push']

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_IMAGE_NAME}:latest
